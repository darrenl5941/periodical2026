<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            /* CSS */
            body {
                height: 100vh !important;
            }
            span {
                padding: 20px 20px;
                margin-top: 50px;
                border: 2px solid black;
                width: 20px;
                height: 30px;
                cursor: pointer;
            }

            .idk {
                display: flex;
                width: 100%;
                justify-content: space-between;
                padding: 0px 50px;
            }
            .sec {
                display: flex;
                flex-direction: column;
            }

            .elements {
                display: flex;
                gap: 2px;
            }

        </style>

        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->
         <div class = "idk">
                <div class="sec metals">
                    <h1>Metals</h1>
                    <div class="elements temp" id="metals">
                    </div>
                </div>
                <div class="sec metalloids">
                    <h1>Metalloids</h1>
                    <div class="elements temp" id="metalloids">
                    </div>
                </div>
                <div classs="sec">
                    <h1>Nonmetals</h1>
                    <div class="elements temp" id="nonmetals">
                    </div>
                </div>
        </div>
            <!-- <span id = "H" data-desc = "H is..." data-atomic-number = 1 data-symbol = "H" data-atomic-name = "Hydrogen">H</span>
            <span id = "He" data-desc = "He is..." data-atomic-number = 2 data-symbol = "He" data-atomic-name = "Helium">He</span> -->
            <!-- <span id = "He" data-desc = "He is..." data-atomic-number = 2 data-symbol = "He" data-atomic-name = "Helium">He</span> -->
         <div id = "information">
            <h2 id = "name"></h2>
            <h2 id = "symbol"></h2>
            <h2 id= "number"></h2>
            <p id = "description"></p>
         </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
        <script>
            // JS

            const elements = [{
                name: "Hydrogen",
                atomicNumber: 1,
                symbol: "H",
                description: `Discovery: Hydrogen was discovered in 1766 by Henry Cavendish <br> Roots of its name: Came from the Greek word "Hydro", which means water, and "Genes", which means creator. Together it means "water-former" <br> Interesting fact/trivia: Hydrogen can turn into a metal at extremely high pressures.`,
                type: "nonmetal"
                },
                {
                    name: "Helium",
                    atomicNumber: 2,
                    symbol: "He",
                    description: `Discovery: Helium was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "nonmetal"
                },
                {
                    name: "Lithium",
                    atomicNumber: 3,
                    symbol: "Li",
                    description: `Discovery: Lithium was discovered in 1817 by Johan August Arfwedson. <br> Roots of its name: From the Greek word "lithos," which means "stone". Was called this because it was discovered in a solid mineral instead of a plant. <br> 
                    Interesting fact/trivia: Its one of only three elements created in significant amounts during the Big Bang, alongside hydrogen and helium. Some of the lithium on Earth today is 13.8 billion year old cosmic leftovers. (If the 13.8 billion years measured as a year the whole of human history would just be the last 2 seconds.)

`,
                    type: "metal"
                },
                {
                    name: "Nitrogen",
                    atomicNumber: 7,
                    symbol: "N",
                    description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "nonmetal"
                },
                {
                    name: "Oxygen",
                    atomicNumber: 8,
                    symbol: "O",
                    description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "nonmetal"
                },
                {
                    name: "Aluminum",
                    atomicNumber: 13,
                    symbol: "Al",
                    description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "metalloids"
                },
                {
                    name: "Phosphorus",
                    atomicNumber: 15,
                    symbol: "P",
                    description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "nonmetal"
                },
                {
                    name: "Sulfur",
                    atomicNumber: 16,
                    symbol: "S",
                    description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "nonmetal"
                },
                {
                    name: "Argon",
                    atomicNumber: 18,
                    symbol: "Ar",
                    description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "nonmetal"
                },
                {
                    name: "Potassium",
                    atomicNumber: 19,
                    symbol: "K",
                    description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "metal"
                },
                {
                    name: "Calcium",
                    atomicNumber: 20,
                    symbol: "Ca",
                    description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "metal"
                },
                {
                    name: "Bromine",
                    atomicNumber: 35,
                    symbol: "Br",
                    description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "nonmetal"
                },
                {
                    name: "Silver",
                    atomicNumber: 47,
                    symbol: "Ag",
                    description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "metal"
                }, 
                {
                    name: "Cesium",
                    atomicNumber: 55,
                    symbol: "Cs",
                    description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "metal"
                },
                {
                    name: "Gold",
                    atomicNumber: 79,
                    symbol: "Au",
                    description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "metal"
                },
                {
                    name: "Lawrencium",
                    atomicNumber: 103,
                    symbol: "Lr",
                    description: `Discovery: ... was discovered in ... by ... <br> Roots of its name: ... <br> Interesting fact/trivia: ...`,
                    type: "metal"
                },
            ]
            var atomicName
            var atomicSymbol;
            var atomicNumber
            var description;
            elements.forEach(function (el) {
                const newSpan = document.createElement("span");
                newSpan.innerHTML = el.symbol;
                newSpan.id = el.atomicNumber;
                newSpan.setAttribute("data-atomic-number", el.atomicNumber);
                newSpan.setAttribute("data-symbol", el.symbol);
                newSpan.setAttribute("data-desc", el.description);
                newSpan.setAttribute("data-atomic-name", el.name);
                const metalloids = document.querySelector("#metalloids");
                const nonmetals = document.querySelector("#nonmetals");
                const metals = document.querySelector("#metals");
                if (el.type === "metalloids") {
                    metalloids.appendChild(newSpan);
                } else if (el.type === "metal") {
                    metals.appendChild(newSpan);
                } else {
                nonmetals.appendChild(newSpan);
                }
            })
            document.querySelectorAll('span').forEach(function(eachElement){
                eachElement.addEventListener("click", function(event){
                    atomicName = event.target.dataset.atomicName
                    atomicSymbol = event.target.dataset.symbol
                    atomicNumber = event.target.dataset.atomicNumber
                    description = event.target.dataset.desc
                    document.querySelector('#name').innerHTML = "Atomic Name: " + atomicName
                    document.querySelector('#symbol').innerHTML = "Atomic Symbol: " + atomicSymbol
                    document.querySelector('#number').innerHTML = "Atomic Number: " + atomicNumber
                    document.querySelector('#description').innerHTML = description
                })
            })
            // function setup() {

        </script>
    </body>
</html>
